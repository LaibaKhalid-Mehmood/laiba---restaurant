<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
       <link rel="StyleSheet" href="Style.css">
</head>
<body>
    <h1> Contact Information</h1>
    <form action="action.php" method="POST">
    <div>
    <label for="fName"> First Name: </label>
    <input type="text" id="fName" name="fName" placeholder="Enter first name" required>
    </div>

    <br> 

    <div>
    <label for="lName"> Last Name: </label>
    <input type="text" id="lName" name="lName" placeholder="Enter last name" required>
    </div>

    <br>

    <div>
    <label for="email"> Email: </label>
    <input type="email" id="email" name="email" placeholder="Enter email" required>
    </div>

    <br> 

    <div>
    <label for="PhoneNo"> Phone No: </label>
    <input type="tel" id="PhoneNo" name="PhoneNo" placeholder="Enter phone number" required>
    </div>

    <br> 

    <div>
    <label for="gender"> Gender: </label>
    <label for="male"> Male </label>
    <input type="radio" id="male" name="gender" value="Male">
    <label for="female"> Female </label>
    <input type="radio" id="female" name="gender" value="Female">
    </div>

    <br> 

     <div>
     <label for="foodSelection"> Food Selection: </label>
     <label for="pizza"> Pizza </label>
     <input type="checkbox" id="pizza" name="foodSelection" value="Pizza">

     <label for="burger"> Burger </label>
     <input type="checkbox" id="burger" name="foodSelection" value="Burger">

     <label for="fries"> Fries </label>
     <input type="checkbox" id="fries" name="foodSelection" value="Fries">

     <label for="pasta"> Pasta</label>
     <input type="checkbox" id="pasta" name="foodSelection" value="Pasta">

     <label for="shawarma"> Shawarma </label>
     <input type="checkbox" id="shawarma" name="foodSelection" value="Shawarma">
     </div>

     <br> 

     <div>
     <label for="quantity"> Quantity: </label>
     <input type="number" min="0" max="30" value="5">
     </div>

     <br>

     <div>
    <label for="paymentMethod"> Payment Method: </label>
    <select id="paymentMethod" name="paymentMethod">
        <option value=" By Card"> By Card </option>
        <option value="Cash"> Cash </option>
    </select>
    </div>

    <br>
    <div> 
        <input type="Reset">
    </div>

     <br>
    <div> 
        <input type="Submit">
    </div>
    </form>

</body>
</html>
